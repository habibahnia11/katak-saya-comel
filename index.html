<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frog Math Jump - Hutan Rawa Ceria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --water: #29b6f6; --sky: #87CEEB; }
        body { font-family: 'Poppins', sans-serif; overflow: hidden; background: #333; margin: 0; }
        
        .game-container {
            width: 100vw; height: 100vh;
            background: linear-gradient(180deg, var(--sky) 0%, #E0F7FA 70%, var(--water) 100%);
            position: relative; overflow: hidden;
        }

        .frog {
            position: absolute; width: 80px; height: 80px;
            z-index: 20; transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            object-fit: contain; bottom: 120px; left: 45%;
        }

        .lily-pad {
            width: 100px; height: 50px; background: #66BB6A;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: white; cursor: pointer; transition: transform 0.2s;
        }

        .water-splash {
            position: absolute; bottom: 0; width: 100%; height: 20%;
            background: rgba(41, 182, 246, 0.6); pointer-events: none;
        }

        .falling { transform: translateY(300px) scale(0.5); opacity: 0; }
    </style>
</head>
<body>

    <div id="game-container" class="game-container">
        <div class="absolute top-4 w-full px-6 flex justify-between z-30">
            <div class="bg-white/50 px-4 py-2 rounded-full font-bold">⭐ Skor: <span id="score">0</span> | ❤️ Nyawa: <span id="lives">3</span></div>
        </div>

        <div class="flex-grow flex items-center justify-center pt-20">
            <div id="question-card" class="bg-white p-6 rounded-3xl shadow-xl text-center">
                <h2 class="text-3xl font-bold text-gray-700" id="question-text">?</h2>
            </div>
        </div>

        <div id="platforms" class="absolute bottom-20 w-full flex justify-center gap-6"></div>
        <img id="frog" src="https://imgur.com/YeNZZrr.png" class="frog" alt="Katak">
        <div class="water-splash"></div>
    </div>

    <div id="menu-overlay" class="absolute inset-0 bg-black/50 z-50 flex items-center justify-center">
        <button onclick="startGame()" class="bg-green-500 text-white px-10 py-4 rounded-full text-2xl font-bold">Mulai Bermain!</button>
    </div>

    <script>
        const state = { score: 0, lives: 3, isAnimating: false };
        const frog = document.getElementById('frog');
        const platformsContainer = document.getElementById('platforms');
        const questionText = document.getElementById('question-text');

        function generateQuestion() {
            const a = Math.floor(Math.random() * 9) + 2;
            const b = Math.floor(Math.random() * 9) + 2;
            return { q: `${a} × ${b} = ?`, ans: a * b };
        }

        function createPlatforms(correctAnswer) {
            platformsContainer.innerHTML = '';
            const choices = new Set([correctAnswer]);
            while(choices.size < 4) choices.add(Math.floor(Math.random() * 81) + 1);
            Array.from(choices).sort(() => Math.random() - 0.5).forEach(val => {
                const btn = document.createElement('div');
                btn.className = 'lily-pad';
                btn.textContent = val;
                btn.onclick = () => handleJump(btn, val, correctAnswer);
                platformsContainer.appendChild(btn);
            });
        }

        function handleJump(targetEl, chosen, correct) {
            if (state.isAnimating) return;
            state.isAnimating = true;

            // Gerakkan katak ke posisi tombol
            const rect = targetEl.getBoundingClientRect();
            frog.style.left = `${rect.left + rect.width/2 - 40}px`;
            frog.style.bottom = `${window.innerHeight - rect.top}px`;

            setTimeout(() => {
                if (chosen === correct) {
                    state.score += 10;
                    document.getElementById('score').textContent = state.score;
                    frog.style.bottom = '120px'; // Balik ke posisi awal
                    frog.style.left = '45%';
                    nextRound();
                } else {
                    frog.classList.add('falling');
                    state.lives--;
                    document.getElementById('lives').textContent = state.lives;
                    setTimeout(() => {
                        if (state.lives <= 0) { alert('Game Over!'); location.reload(); }
                        else { 
                            frog.classList.remove('falling'); 
                            frog.style.bottom = '120px'; 
                            frog.style.left = '45%'; 
                            state.isAnimating = false;
                        }
                    }, 1000);
                }
                if (chosen === correct) state.isAnimating = false;
            }, 600);
        }

        function nextRound() {
            const qData = generateQuestion();
            questionText.textContent = qData.q;
            createPlatforms(qData.ans);
        }

        function startGame() {
            document.getElementById('menu-overlay').style.display = 'none';
            nextRound();
        }
    </script>
</body>
</html>
